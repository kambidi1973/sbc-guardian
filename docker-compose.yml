version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sbc-guardian-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sbc:guardian@postgres:5432/sbc_guardian
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - backup_data:/app/backups
    networks:
      - sbc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sbc-guardian-worker
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://sbc:guardian@postgres:5432/sbc_guardian
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
    depends_on:
      - backend
      - redis
    volumes:
      - backup_data:/app/backups
    networks:
      - sbc-network
    restart: unless-stopped

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sbc-guardian-beat
    command: celery -A app.tasks beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://sbc:guardian@postgres:5432/sbc_guardian
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis
    networks:
      - sbc-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sbc-guardian-ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - sbc-network
    restart: unless-stopped

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sbc-guardian-db
    environment:
      POSTGRES_DB: sbc_guardian
      POSTGRES_USER: sbc
      POSTGRES_PASSWORD: guardian
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sbc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbc -d sbc_guardian"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sbc-guardian-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sbc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local

networks:
  sbc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
